name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@main
        with:
          project_id: agenthub-dev
          service_account_key: ${{ secrets.GH_CI_CD_SA_KEY }}
          export_default_credentials: true

      - name: Setup Google Application Credentials
        run: |
          echo '${{ secrets.GH_CI_CD_SA_KEY }}' > ./gcloud.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=`pwd`/gcloud.json" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine keyring keyrings.google-artifactregistry-auth

      - name: Auto-increment version and tag
        uses: anothrNick/github-tag-action@1.73.0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CI_CD_TAG_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Build package
        run: |
          python -m build

      - name: Deploy to Google Artifact Registry
        run: |
          python -m twine upload --repository-url https://us-west1-python.pkg.dev/agenthub-dev/gumloop/ dist/* 